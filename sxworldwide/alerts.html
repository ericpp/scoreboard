<html>
<head>
<title>Boost Alert</title>

<link href="../alerts.css" rel="stylesheet">

<style>
@font-face {
  font-family: 'Limelight Regular'; /* Name of the font */
  src: url('Limelight-Regular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

.messageFlex {
  font-family: 'Limelight Regular', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  color: #000;
  text-shadow: none;
}

.background {
  height: 323px;
  width: 608px;
}

.message {
  width: 360px;
  display: flex;
  align-items: center;
}

</style>

<script src="https://unpkg.com/nostr-tools/lib/nostr.bundle.js"></script>
<script src="../tracker.js"></script>
<script src="../alerts.js"></script>
<script src="config.js"></script>
</head>

<body>
<div id="box">

  <div id="alert" class="alert fade" data-timehide="7.5">
    <div class="messageFlex">
      <img class="background" src="alert.jpg">
      <div class="message fadeOut" data-timehide="7.5">
        <div class="messageText" style="flex: 1 1"></div>
      </div>
    </div>
  </div>

</div>

<script>
(async () => {
  const decodeEntities = (() => {
    const el = document.createElement('textarea')
    return text => { el.innerHTML = text; return el.textContent }
  })()

  const config = loadConfig();
  const slots = [
    {
      id: "#alert",
      events: {
        messageRender: (payment) => {
          const message = [`${decodeEntities(payment.sender_name)} sent ${payment.sats.toLocaleString()} sats`];
          if (payment.message) {
            message.push(`"${decodeEntities(payment.message)}"`);
          }
          return message;
        },
      },
    },
  ]
  startAlerts({
    slots,
    ...config,
  })
})()
</script>
</body>
</html>
